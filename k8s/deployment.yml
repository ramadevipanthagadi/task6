apiVersion: apps/v1
kind: Deployment
metadata:
  name: rose deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rose
  template:
    metadata:
      labels:
        app: rose
    spec:
      containers:
      - name: rose-container
        image: sunithriyansh/rose:latest  
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: rose-service
spec:
  type: LoadBalancer
  selector:
    app: rose
  ports:
    - protocol: TCP
      port: 80       
      targetPort: 8080  
